name = "mag-weekly-service-plans"
main = "src/worker.js"
compatibility_date = "2024-01-01"
workers_dev = true

[triggers]
crons = ["0 3 * * 6"]   # Saturday 03:00 UTC = 4:00 PM NZDT (safety net)
# Switch to "0 4 * * 6" during NZ Standard Time (NZST = UTC+12, April–September)

[observability]
enabled = true

[[queues.producers]]
binding = "EVENT_QUEUE"
queue = "mag-service-plan-events"

[[queues.consumers]]
queue = "mag-service-plan-events"
max_batch_size = 1
max_batch_timeout = 0

[[kv_namespaces]]
binding = "STATE"
id = "c8ce227c8d6f40f8ba80256c8a2defab"
